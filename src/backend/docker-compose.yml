services:
  mysql:
    image: mysql:8.0
    container_name: scider-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 218218wcj
      MYSQL_DATABASE: db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: scider-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    image: ghcr.io/xiacang/software-scider/backend:dev
    build: .
    container_name: scider-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override host-based URLs to use Docker Compose service names
      - DATABASE_URL=mysql+asyncmy://root:218218wcj@mysql:3306/db?charset=utf8mb4
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  uploads_data:
