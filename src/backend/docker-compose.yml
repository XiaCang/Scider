services:
  mysql:
    image: mysql:8.0
    container_name: scider-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 218218wcj
      MYSQL_DATABASE: db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: scider-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
