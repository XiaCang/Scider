name: Backend CI/CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [dev]
    paths:
      - 'src/backend/**'
  pull_request:
    branches: [dev]
    paths:
      - 'src/backend/**'

defaults:
  run:
    working-directory: src/backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: pytest --maxfail=3 --disable-warnings -q

  build-and-deploy:
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 新增：将仓库名转为小写并存入环境变量
      - name: Lowercase repository name
        run: |
          echo "REPO_LOWER=${REPO,,}" >> $GITHUB_ENV
        env:
          REPO: ${{ github.repository }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: src/backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:dev
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}

      - name: Deploy to dev server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/backend
            docker compose pull backend
            docker compose up -d backend
            docker image prune -f